<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IPFS vs Blockchain</title>

  <!-- Tipografia -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>IPFS / Blockchain System</h1>

  <!-- BOTON MODO -->
  <button id="themeToggle">☼</button>
</header>

<main class="layout">

  <!-- UPLOAD -->
  <section class="panel upload">
    <h2>Upload</h2>

    <input type="file" id="fileInput">

    <button id="uploadBtn" type="button">Process</button>

    <p id="status" class="status"></p>

    <div class="result-grid">
      <div><span>CID</span><span id="cid">-</span></div>
      <div><span>HASH</span><span id="hash">-</span></div>
    </div>
    
  </section>

  <!-- RESULTADOS -->
  <section class="panel verification">
    <h2>Verification</h2>

    <input 
      type="text" 
      id="verifyInput" 
      placeholder="Introduce un CID..."
      class="cid-search"
    >

    <button id="verifyBtn">Verify</button>

    <p id="verifyStatus" class="status"></p>

    <div class="result-grid">
      <div><span>Exists</span><span id="verifyExists">-</span></div>
      <div><span>Timestamp</span><span id="verifyTimestamp">-</span></div>
    </div>
</section>

  <!-- HISTORICO -->
  <section id="cid-panel" class="panel">
    <h2>Histórico de CIDs</h2>

    <input 
      type="text" 
      id="cidSearch" 
      placeholder="Buscar CID..." 
      class="cid-search"
    >

    <div class="cid-container">
      <ul id="cidList"></ul>
    </div>
  </section>

  <!-- METRICAS -->
  <section class="panel metrics">
    <h2>Metrics</h2>

    <div class="metrics">

      <!-- CONTENEDOR DE GRAFICAS -->
      <div class="charts-container">
        <div class="chart-box">
          <canvas id="timeChart"></canvas>
        </div>
        <div class="chart-box">
          <canvas id="gasChart"></canvas>
        </div>
      </div>

      <!-- METRICAS NUMERICAS -->
      <div class="metrics-grid">
        <div><span>IPFS</span><span id="ipfsTime">-</span></div>
        <div><span>Blockchain</span><span id="blockchainTime">-</span></div>
        <div><span>Verify</span><span id="verifyTime">-</span></div>
        <div><span>Total</span><span id="totalTime">-</span></div>
        <div><span>Gas</span><span id="gasUsed">-</span></div>
      </div>

    </div>
  </section>

</main>

<footer>
  <p>Decentralized Verification Interface</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/app.js"></script>

</body>
</html>
